name: Build and Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ──────────────────────────────────────────────
# Job 1: 统一计算版本号
# ──────────────────────────────────────────────
jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      legal:    ${{ steps.v.outputs.legal }}
      ver_only: ${{ steps.v.outputs.ver_only }}
      date_iso: ${{ steps.v.outputs.date_iso }}

    steps:
      - id: v
        shell: bash
        run: |
          RAW="${GITHUB_REF##*/}"
          NUM="${RAW#v}"
          SHA="${GITHUB_SHA:0:7}"
          DATE=$(TZ=Asia/Shanghai date +%Y%m%d)
          DATE_ISO=$(TZ=Asia/Shanghai date +%Y-%m-%d)

          if [[ ! "$NUM" =~ ^[0-9] ]]; then
            LEGAL="v0.0.0-${NUM//\//-}-${DATE}-${SHA}"
          else
            LEGAL="v${NUM}-${DATE}-${SHA}"
          fi

          echo "legal=${LEGAL}"       >> "$GITHUB_OUTPUT"
          echo "ver_only=${NUM}"      >> "$GITHUB_OUTPUT"
          echo "date_iso=${DATE_ISO}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Job 2: Linux (amd64 / arm64)
  # ──────────────────────────────────────────────
  build-linux:
    name: Linux / ${{ matrix.arch }}
    needs: version
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            image: crossdesk/ubuntu20.04:latest
            pkg_script: ./scripts/linux/pkg_amd64.sh

          - arch: arm64
            runner: ubuntu-22.04-arm
            image: crossdesk/ubuntu20.04-arm64v8:latest
            pkg_script: ./scripts/linux/pkg_arm64.sh

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        env:
          CUDA_PATH: /usr/local/cuda
          XMAKE_GLOBALDIR: /data
          VER: ${{ needs.version.outputs.legal }}
        run: |
          xmake f --CROSSDESK_VERSION="$VER" --USE_CUDA=true --root -y
          xmake b -vy --root crossdesk

      - name: Package (.deb)
        env:
          VER: ${{ needs.version.outputs.legal }}
        run: |
          chmod +x "${{ matrix.pkg_script }}"
          "${{ matrix.pkg_script }}" "$VER"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossdesk-linux-${{ matrix.arch }}-${{ needs.version.outputs.legal }}
          path: crossdesk-linux-${{ matrix.arch }}-${{ needs.version.outputs.legal }}.deb
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 3: macOS (x64 Intel / arm64 Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    name: macOS / ${{ matrix.arch }}
    needs: version
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            cache_key: intel
            pkg_script: ./scripts/macosx/pkg_x64.sh

          - arch: arm64
            runner: macos-14
            cache_key: arm
            pkg_script: ./scripts/macosx/pkg_arm64.sh

    steps:
      - name: Restore xmake package cache
        uses: actions/cache@v4
        with:
          path: ~/.xmake/packages
          key: macos-xmake-${{ matrix.cache_key }}-${{ hashFiles('**/xmake.lua') }}
          restore-keys: macos-xmake-${{ matrix.cache_key }}-

      - name: Install xmake
        run: brew install xmake

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        env:
          VER: ${{ needs.version.outputs.legal }}
        run: |
          xmake f --CROSSDESK_VERSION="$VER" --USE_CUDA=false -y
          xmake b -vy crossdesk

      - name: Package (.pkg)
        env:
          VER: ${{ needs.version.outputs.legal }}
        run: |
          chmod +x "${{ matrix.pkg_script }}"
          "${{ matrix.pkg_script }}" "$VER"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossdesk-macos-${{ matrix.arch }}-${{ needs.version.outputs.legal }}
          path: crossdesk-macos-${{ matrix.arch }}-${{ needs.version.outputs.legal }}.pkg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 4: Windows x64
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows / x64
    needs: version
    runs-on: windows-2022
    env:
      XMAKE_GLOBALDIR: D:\xmake_global
      VER: ${{ needs.version.outputs.legal }}

    steps:
      - name: Restore xmake package cache
        uses: actions/cache@v4
        with:
          path: D:\xmake_global\.xmake\packages
          key: windows-xmake-intel-${{ hashFiles('**/xmake.lua') }}
          restore-keys: windows-xmake-intel-

      - name: Install xmake
        shell: pwsh
        run: |
          Invoke-Expression (
            Invoke-WebRequest 'https://raw.githubusercontent.com/tboox/xmake/master/scripts/get.ps1' -UseBasicParsing
          ).Content
          "C:\Users\runneradmin\xmake" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve or install CUDA
        shell: pwsh
        run: |
          $pkgDir = "D:\xmake_global\.xmake\packages"
          $cudaPath = ""

          if (Test-Path $pkgDir) {
            Push-Location $env:RUNNER_TEMP
            xmake create _probe 2>$null | Out-Null
            Set-Location _probe
            xmake g --theme=plain 2>$null | Out-Null
            try {
              $info = xmake require --info "cuda 12.6.3" 2>$null
              $line = ($info | Select-String 'installdir') | Select-Object -First 1
              if ($line) {
                $cudaPath = ($line.ToString() -replace '.*installdir:\s*','').Trim()
              }
            } catch {}
            Pop-Location
          }

          if (-not $cudaPath -or -not (Test-Path $cudaPath)) {
            Write-Host "CUDA not cached, installing..."
            Push-Location $env:RUNNER_TEMP
            xmake create _probe2 2>$null | Out-Null
            Set-Location _probe2
            xmake g --theme=plain 2>$null | Out-Null
            xmake require -vy "cuda 12.6.3"
            $info = xmake require --info "cuda 12.6.3"
            $line = ($info | Select-String 'installdir') | Select-Object -First 1
            $cudaPath = ($line.ToString() -replace '.*installdir:\s*','').Trim()
            Pop-Location
          }

          Write-Host "CUDA_PATH = $cudaPath"
          "CUDA_PATH=$cudaPath" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install NSIS INetC plugin
        shell: pwsh
        run: |
          $nsisDir = "C:\Program Files (x86)\NSIS\Plugins\x86-unicode"
          $zip = "$env:RUNNER_TEMP\InetC.zip"
          Invoke-WebRequest `
            "https://github.com/DigitalMediaServer/NSIS-INetC-plugin/releases/download/v1.0.5.7/InetC.zip" `
            -OutFile $zip
          Expand-Archive $zip -DestinationPath "$env:RUNNER_TEMP\InetC" -Force
          Copy-Item "$env:RUNNER_TEMP\InetC\x86-unicode\INetC.dll" "$nsisDir\INetC.dll" -Force

      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Copy nsProcess plugin to NSIS
        shell: pwsh
        run: |
          Copy-Item "${{ github.workspace }}\scripts\windows\nsProcess.dll" `
            "C:\Program Files (x86)\NSIS\Plugins\x86-unicode\nsProcess.dll" -Force

      - name: Build
        shell: pwsh
        run: |
          xmake f --CROSSDESK_VERSION="$env:VER" --USE_CUDA=true -y
          xmake b -vy crossdesk

      - name: Package installer (.exe)
        shell: pwsh
        working-directory: ${{ github.workspace }}\scripts\windows
        run: makensis /DVERSION=$env:VER nsis_script.nsi

      - name: Package portable (.zip)
        shell: pwsh
        run: |
          $portDir = "${{ github.workspace }}\portable"
          New-Item -ItemType Directory -Force -Path $portDir | Out-Null
          Copy-Item "${{ github.workspace }}\build\windows\x64\release\crossdesk.exe" `
            "$portDir\CrossDesk.exe"
          Compress-Archive -Path "$portDir\*" `
            -DestinationPath "${{ github.workspace }}\crossdesk-win-x64-portable-$env:VER.zip"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossdesk-win-x64-${{ needs.version.outputs.legal }}
          path: ${{ github.workspace }}\scripts\windows\crossdesk-win-x64-${{ needs.version.outputs.legal }}.exe
          if-no-files-found: error

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: crossdesk-win-x64-portable-${{ needs.version.outputs.legal }}
          path: ${{ github.workspace }}\crossdesk-win-x64-portable-${{ needs.version.outputs.legal }}.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Job 5: 发布 Release（仅 tag 推送时触发）
  # ──────────────────────────────────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        env:
          VER: ${{ needs.version.outputs.legal }}
        run: |
          mkdir -p release
          cp artifacts/crossdesk-macos-x64-${VER}/*             release/crossdesk-macos-x64-${VER}.pkg
          cp artifacts/crossdesk-macos-arm64-${VER}/*           release/crossdesk-macos-arm64-${VER}.pkg
          cp artifacts/crossdesk-linux-amd64-${VER}/*           release/crossdesk-linux-amd64-${VER}.deb
          cp artifacts/crossdesk-linux-arm64-${VER}/*           release/crossdesk-linux-arm64-${VER}.deb
          cp artifacts/crossdesk-win-x64-${VER}/*               release/crossdesk-win-x64-${VER}.exe
          cp artifacts/crossdesk-win-x64-portable-${VER}/*      release/crossdesk-win-x64-portable-${VER}.zip
          ls -lh release/

      - name: Upload to versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.legal }}
          name: Release ${{ needs.version.outputs.legal }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: release/*
          body: |
            Binary release only. Source code is not included.

      - name: Create or update 'latest' tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force

      - name: Upload to latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          draft: false
          prerelease: false
          files: release/*
          generate_release_notes: false

      - name: Upload artifacts to server
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --progress --delete
          path: release/*
          remote_path: /var/www/html/downloads/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_KEY }}

      - name: Generate version.json
        env:
          VER: ${{ needs.version.outputs.legal }}
          VER_ONLY: ${{ needs.version.outputs.ver_only }}
          DATE_ISO: ${{ needs.version.outputs.date_iso }}
        run: |
          cat > version.json << EOF
          {
            "version": "${VER_ONLY}",
            "releaseDate": "${DATE_ISO}",
            "releaseName": "",
            "releaseNotes": "",
            "tagName": "${VER}",
            "downloads": {
              "windows-x64": {
                "url": "https://downloads.crossdesk.cn/crossdesk-win-x64-${VER}.exe",
                "filename": "crossdesk-win-x64-${VER}.exe"
              },
              "windows-x64-portable": {
                "url": "https://downloads.crossdesk.cn/crossdesk-win-x64-portable-${VER}.zip",
                "filename": "crossdesk-win-x64-portable-${VER}.zip"
              },
              "macos-x64": {
                "url": "https://downloads.crossdesk.cn/crossdesk-macos-x64-${VER}.pkg",
                "filename": "crossdesk-macos-x64-${VER}.pkg"
              },
              "macos-arm64": {
                "url": "https://downloads.crossdesk.cn/crossdesk-macos-arm64-${VER}.pkg",
                "filename": "crossdesk-macos-arm64-${VER}.pkg"
              },
              "linux-amd64": {
                "url": "https://downloads.crossdesk.cn/crossdesk-linux-amd64-${VER}.deb",
                "filename": "crossdesk-linux-amd64-${VER}.deb"
              },
              "linux-arm64": {
                "url": "https://downloads.crossdesk.cn/crossdesk-linux-arm64-${VER}.deb",
                "filename": "crossdesk-linux-arm64-${VER}.deb"
              }
            }
          }
          EOF

      - name: Upload version.json to server
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: version.json
          remote_path: /var/www/html/version/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_KEY }}
